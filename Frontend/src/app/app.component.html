<div class="container">
  <div class="p-card main-card">
    <h2>URL Analyzer</h2>
    <div class="p-inputgroup">
      <input type="text" pInputText placeholder="Enter URL" [(ngModel)]="url" />
      <button pButton label="Check" icon="pi pi-check" (click)="checkUrl()"></button>
    </div>
  </div>

  <p-table [value]="checks" stripedRows [loading]="isNotLoaded">
    <ng-template pTemplate="header">
      <tr>
        <th>URL</th>
        <th>Verdict</th>
        <th>Checked At</th>
      </tr>
    </ng-template>
    <ng-template pTemplate="body" let-row>
      <tr>
        <td>{{row.url}}</td>
        <td [ngClass]="{'phishing': row.verdict === 'Phishing', 'safe': row.verdict === 'Safe'}">{{row.verdict}}</td>
        <td>{{row.checked_at | date:'short'}}</td>
      </tr>
    </ng-template>
  </p-table>

  <p-toast></p-toast>
</div>
